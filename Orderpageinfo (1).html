<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Tracking</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* সব এলিমেন্টের সাইজ ঠিক রাখার জন্য */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: linear-gradient(160deg, #f4f7f6 0%, #eef3f1 100%);
            padding: 15px;
            font-family: 'Segoe UI', Arial, sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .tracking-container {
            width: 100%;
            max-width: 480px;
            margin: 20px auto;
            padding: 32px 22px;
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.08);
            text-align: center;
        }

        .tracking-container h2 {
            margin-bottom: 26px;
            font-size: 21px;
            color: #222;
            font-weight: 700;
        }

        .search-box {
            display: flex;
            flex-wrap: nowrap;
            gap: 10px;
            margin-bottom: 32px;
            align-items: center;
            width: 100%;
        }

        .search-box input {
            flex: 1 1 auto;
            min-width: 0;
            height: 48px;
            padding: 10px 14px;
            border: 1.5px solid #dadfe2;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.25s;
        }

        .search-box input:focus {
            border-color: #28a745;
            box-shadow: 0 0 0 3px rgba(40, 167, 69, 0.12);
        }

        .search-box button {
            flex: 0 0 auto;
            height: 48px;
            padding: 0 18px;
            background: #28a745;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 15px;
            font-weight: 700;
            transition: background 0.25s, transform 0.15s;
            white-space: nowrap;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            box-shadow: 0 4px 10px rgba(40, 167, 69, 0.25);
        }

        .search-box button:hover {
            background: #218838;
        }
        .search-box button:active {
            transform: scale(0.97);
        }

        .progress-track {
            display: flex;
            flex-direction: column-reverse;
            align-items: flex-start;
            gap: 26px;
            position: relative;
            margin-bottom: 36px;
            padding: 6px 6px 6px 0;
            text-align: left;
        }

        .progress-track::before {
            content: '';
            position: absolute;
            left: 16px;
            top: 16px;
            bottom: 16px;
            width: 4px;
            background: #eef0f0;
            z-index: 1;
            border-radius: 4px;
        }

        .step-row {
            display: flex;
            align-items: center;
            gap: 14px;
            position: relative;
            z-index: 2;
        }

        .step {
            position: relative;
            z-index: 2;
            background: #eef0f0;
            color: #9aa1a1;
            width: 34px;
            height: 34px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 14px;
            font-weight: 700;
            transition: 0.4s;
            border: 3px solid #fff;
            flex-shrink: 0;
        }

        .step-label {
            font-size: 13.5px;
            color: #777;
            white-space: nowrap;
            font-weight: 500;
        }

        .step.active {
            background: #28a745;
            color: white;
            box-shadow: 0 0 0 4px rgba(40, 167, 69, 0.15);
        }
        .step.active + .step-label {
            color: #28a745;
            font-weight: 700;
        }

        #statusMessage {
            margin-top: 28px;
            padding: 12px 16px;
            border-radius: 10px;
            background: #f3faf5;
            color: #28a745;
            font-weight: 600;
            font-size: 14px;
            line-height: 1.5;
        }
        #statusMessage.neutral {
            background: #f4f6f6;
            color: #777;
            font-weight: 500;
        }

        .status-updated-at {
            margin-top: 10px;
            font-size: 12.5px;
            color: #999;
            font-weight: 500;
        }
        .status-updated-at i { margin-right: 5px; }

        .status-note {
            margin-top: 8px;
            padding: 10px 14px;
            background: #fffaf0;
            border: 1px dashed #f0c987;
            border-radius: 10px;
            color: #8a6d3b;
            font-size: 13px;
            text-align: left;
            line-height: 1.5;
        }
        .status-note i { margin-right: 6px; color: #d99a3a; }

        .canceled-box {
            display: none;
            padding: 22px 18px;
            background: #fff1f1;
            border: 1px solid #ffd9d9;
            border-radius: 12px;
            color: #c92a2a;
            margin-top: 24px;
        }

        .canceled-box h3 {
            margin: 0 0 10px 0;
            font-size: 17px;
        }

        .loading-text {
            color: #777;
            font-style: italic;
            display: none;
            margin-bottom: 15px;
            font-size: 13.5px;
        }

        @media (max-width: 360px) {
            .step-label {
                font-size: 12px;
            }
            .search-box button {
                padding: 0 14px;
                font-size: 14px;
            }
        }

        .progress-track.compact-steps {
            gap: 18px;
        }
        .progress-track.compact-steps .step {
            width: 28px;
            height: 28px;
            font-size: 12px;
        }
        .progress-track.compact-steps::before {
            left: 13px;
        }
        .progress-track.compact-steps .step-label {
            font-size: 12px;
        }
        @media (max-width: 360px) {
            .progress-track.compact-steps .step-label {
                font-size: 11px;
            }
        }

        /* --- Professional Toast Notification --- */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background-color: #323232;
            color: white;
            padding: 14px 22px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 14px;
            font-weight: 500;
            z-index: 999;
            box-shadow: 0 6px 20px rgba(0,0,0,0.25);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.35s ease, transform 0.35s ease;
            max-width: 90%;
            text-align: left;
        }
        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
            pointer-events: auto;
        }
        .toast.success { background-color: #28a745; }
        .toast.error { background-color: #d9534f; }
        .toast .toast-icon {
            font-size: 18px;
            flex-shrink: 0;
            font-weight: bold;
        }
    
     /* --- Premium App-Themed Bottom Navigation Menu --- */
.bottom-nav {
    position: fixed;
    bottom: 0;
    left: 0;
    width: 100%;
    background-color: #ffffff;
    display: flex;
    justify-content: space-around;
    padding: 10px 0;
    /* আপনার থিমের সাথে ম্যাচিং হালকা পার্পল গ্লো শ্যাডো */
    box-shadow: 0 -5px 25px rgba(81, 45, 168, 0.06); 
    z-index: 100;
    border-top-left-radius: 20px;
    border-top-right-radius: 20px;
    border-top: 1px solid #f3e8ff; /* হালকা পার্পল বর্ডার লাইন */
}

.nav-item {
    text-decoration: none !important; 
    display: flex;
    flex-direction: column; 
    align-items: center;
    color: #88909d; /* শুধু এই লাইনটি পরিবর্তন করুন (এটি স্ক্রিনশটের গ্রে কালার) */
}


.nav-item i {
    font-size: 19px;
    margin-bottom: 4px;
    transition: transform 0.2s ease;
}

.nav-item p {
    margin: 0 !important;
    padding: 0;
    font-size: 11px;
    font-weight: 500;
}

/* মাউস নিলে বা আঙুল দিয়ে টাচ করলে হালকা ইন্টারঅ্যাকশন */
.nav-item:hover {
    color: #8c73c4;
}

.nav-item:hover i {
    transform: translateY(-2px);
}

/* অ্যাক্টিভ বা সিলেক্টেড বাটনের জন্য আপনার অ্যাপের সিগনেচার ডিপ পার্পল কালার */
.nav-item.active {
    color: #512da8; /* স্ক্রিনশটের মূল পার্পল কালার */
}

.nav-item.active p {
    font-weight: 700; /* অ্যাক্টিভ লেখার ফন্ট একটু মোটা হবে */
}

/* --- Cart Notification Red Dot --- */
.nav-icon-wrap { position: relative; display: inline-block; }
.nav-badge-dot {
    position: absolute;
    top: -3px;
    right: -6px;
    width: 9px;
    height: 9px;
    background-color: #ff3b30;
    border: 1.5px solid #ffffff;
    border-radius: 50%;
    display: none;
    animation: badgePulse 1.4s infinite;
}
.nav-badge-dot.show { display: block; }
@keyframes badgePulse {
    0% { box-shadow: 0 0 0 0 rgba(255,59,48,0.6); }
    70% { box-shadow: 0 0 0 5px rgba(255,59,48,0); }
    100% { box-shadow: 0 0 0 0 rgba(255,59,48,0); }
}

/* --- Status Update Entrance Effect --- */
@keyframes statusPopIn {
    0% { opacity: 0; transform: translateY(10px) scale(0.98); }
    60% { opacity: 1; transform: translateY(-2px) scale(1.01); }
    100% { opacity: 1; transform: translateY(0) scale(1); }
}
.status-animate {
    animation: statusPopIn 0.5s ease;
}

@keyframes stepPop {
    0% { transform: scale(0.7); }
    50% { transform: scale(1.25); }
    100% { transform: scale(1); }
}
.step.active {
    animation: stepPop 0.45s ease;
}

/* --- Customer Order Info Card --- */
.order-info-card {
    display: none;
    margin-top: 22px;
    text-align: left;
    background: linear-gradient(145deg, #ffffff, #f7faf8);
    border: 1px solid #e7efe9;
    border-radius: 14px;
    padding: 18px 18px 14px;
    box-shadow: 0 6px 18px rgba(40, 167, 69, 0.07);
    opacity: 0;
    transform: translateY(14px);
}
.order-info-card.show {
    display: block;
    animation: cardSlideIn 0.5s ease forwards;
}
@keyframes cardSlideIn {
    from { opacity: 0; transform: translateY(14px); }
    to { opacity: 1; transform: translateY(0); }
}
.order-info-card h4 {
    font-size: 14px;
    color: #28a745;
    font-weight: 700;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
}
.order-info-card h4 i { font-size: 14px; }
.info-row {
    display: flex;
    justify-content: space-between;
    gap: 12px;
    padding: 9px 0;
    border-bottom: 1px dashed #e3ebe5;
    font-size: 13.5px;
}
.info-row:last-child { border-bottom: none; }
.info-row .info-label {
    color: #8a9590;
    flex-shrink: 0;
    font-weight: 500;
}
.info-row .info-value {
    color: #232b27;
    font-weight: 700;
    text-align: right;
    word-break: break-word;
}

/* --- Promo Banner (কাস্টমারদের জন্য মেসেজ/অফার ছবি) --- */
.promo-banner {
    width: 100%;
    margin-bottom: 18px;
    border-radius: 14px;
    overflow: hidden;
    box-shadow: 0 6px 16px rgba(0,0,0,0.08);
    line-height: 0;
}
.promo-banner img {
    width: 100%;
    height: auto;
    display: block;
    object-fit: cover;
    transition: transform 0.4s ease;
}
.promo-banner:hover img {
    transform: scale(1.02);
}

    
    </style>
</head>
<body>

<div class="tracking-container">
    <h2>আপনার অর্ডার ট্র্যাক করুন</h2>


    <div class="search-box">
        <input type="text" id="orderInput" placeholder="অর্ডার আইডি (যেমন: KST1001)">
        <button onclick="trackOrder()">Track</button>
    </div>

    <p id="loadingMsg" class="loading-text">খোঁজা হচ্ছে, অপেক্ষা করুন...</p>

    <div id="orderInfoCard" class="order-info-card">
        <h4><i class="fas fa-receipt"></i> অর্ডার তথ্য</h4>
        <div class="info-row"><span class="info-label">অর্ডার আইডি</span><span class="info-value" id="infoOrderId">-</span></div>
        <div class="info-row"><span class="info-label">নাম</span><span class="info-value" id="infoName">-</span></div>
        <div class="info-row"><span class="info-label">মোবাইল নম্বর</span><span class="info-value" id="infoMobile">-</span></div>
        <div class="info-row"><span class="info-label">ঠিকানা</span><span class="info-value" id="infoAddress">-</span></div>
        <div class="info-row"><span class="info-label">অর্ডারের সময়</span><span class="info-value" id="infoDate">-</span></div>
    </div>

    <div id="regularTracking">
        <div class="progress-track" id="progressTrack"></div>
        <p id="statusMessage" class="neutral">আপনার অর্ডার আইডি লিখে Track বাটনে চাপুন</p>
        <p id="statusUpdatedAt" class="status-updated-at" style="display:none;"></p>
        <p id="statusNote" class="status-note" style="display:none;"></p>
    </div>

    <div id="cancelTracking" class="canceled-box">
        <h3>❌ অর্ডারটি ক্যানসেল করা হয়েছে!</h3>
        <p><strong>কারণ:</strong> <span id="cancelReasonText"></span></p>
    </div>

</div>


<div id="toastNotification" class="toast">
    <span class="toast-icon" id="toastIcon">✓</span>
    <span id="toastMessage"></span>
</div>

<script>
    // --- ডেলিভারি টাইপ অনুযায়ী স্টেপ লিস্ট ---
    // হোম ডেলিভারি: ৭ স্টেপ (ডিভিশন ও ডিস্ট্রিক্ট আলাদাভাবে দেখানো হয়)
    const HOME_STEPS = [
        { key: 'Pending',     label: 'Pending' },
        { key: 'Processing',  label: 'Processing' },
        { key: 'Shipped',     label: 'Shipped' },
        { key: 'InDivision',  label: 'In Division' },
        { key: 'InDistrict',  label: 'In District' },
        { key: 'WithRider',   label: 'Out for Delivery' },
        { key: 'Delivered',   label: 'Delivered' }
    ];
    // রোড রিসিভ ডেলিভারি: ৫ স্টেপ (ডিভিশন/ডিস্ট্রিক্ট স্কিপ, সরাসরি রাইডারের কাছে)
    const ROAD_STEPS = [
        { key: 'Pending',     label: 'Pending' },
        { key: 'Processing',  label: 'Processing' },
        { key: 'Shipped',     label: 'Shipped' },
        { key: 'WithRider',   label: 'Out for Delivery' },
        { key: 'Delivered',   label: 'Delivered' }
    ];

    // শীটের Status কলামের টেক্সট (lowercase) থেকে স্টেপ-কী এর ম্যাপ
    const STATUS_KEY_MAP = {
        'pending': 'Pending',
        'processing': 'Processing',
        'shipped': 'Shipped',
        'in division': 'InDivision',
        'in district': 'InDistrict',
        'with rider': 'WithRider',
        'delivered': 'Delivered'
    };

    // ঠিকানার টেক্সট দেখে বোঝা হয় এটা রোড রিসিভ ডেলিভারি কিনা
    function isRoadReceiveAddress(address) {
        return (address || "").includes("রোড রিসিভ ডেলিভারি");
    }

    // বর্তমান ডেলিভারি টাইপ অনুযায়ী প্রগ্রেস-ট্র্যাকের সার্কেলগুলো (re)তৈরি করা
    function buildProgressSteps(steps) {
        const track = document.getElementById('progressTrack');
        track.innerHTML = '';
        track.classList.toggle('compact-steps', steps.length >= 6);
        steps.forEach((s, i) => {
            const row = document.createElement('div');
            row.className = 'step-row';
            row.innerHTML = `<div class="step" id="step-${s.key}">${i + 1}</div><span class="step-label">${s.label}</span>`;
            track.appendChild(row);
        });
    }

    function trackOrder() {
        const orderId = document.getElementById('orderInput').value.trim();
        
        if (orderId === "") {
            showToast("দয়া করে আপনার অর্ডার আইডি দিন!", "error");
            return;
        }

        // UI রিসেট করা (প্রগ্রেস বার সবসময় দেখানো থাকে, শুধু একটিভ স্টেট রিসেট হয়)
        document.getElementById('cancelTracking').style.display = 'none';
        document.getElementById('regularTracking').style.display = 'block';
        buildProgressSteps(HOME_STEPS);
        resetSteps("খোঁজা হচ্ছে, অপেক্ষা করুন...", HOME_STEPS);
        document.getElementById('loadingMsg').style.display = 'block';
        hideOrderInfo();
        hideStatusMeta();

        // ⚠️ গুরুত্বপূর্ণ: এখানে "আপনার_API_ID_এখানে" এর জায়গায় আপনার আসল SheetDB API ID/URL বসান, নাহলে ট্র্যাকিং কাজ করবে না
        const sheetdbUrl = `https://sheetdb.io/api/v1/93y9euunx4nv7/search?${new URLSearchParams({'Order ID': orderId})}`;

        fetch(sheetdbUrl)
            .then(response => {
                if (!response.ok) { throw new Error('HTTP ' + response.status); }
                return response.json();
            })
            .then(data => {
                document.getElementById('loadingMsg').style.display = 'none';

                if (data.length > 0) {
                    const order = data[0]; 
                    const status = order.Status; 
                    const cancelReason = order.CancelReason;

                    // ⚠️ এক্সট্রা API রিকোয়েস্ট ছাড়াই, একই রেসপন্স থেকে কাস্টমারের তথ্য বসানো হলো
                    fillOrderInfo(order);

                    const normalizedStatus = (status || "").trim().toLowerCase();
                    if (normalizedStatus === "canceled" || normalizedStatus === "cancelled") {
                        document.getElementById('regularTracking').style.display = 'none';
                        document.getElementById('cancelTracking').style.display = 'block';
                        document.getElementById('cancelReasonText').innerText = cancelReason || "কোনো কারণ উল্লেখ করা হয়নি।";
                        hideStatusMeta();
                    } else {
                        document.getElementById('regularTracking').style.display = 'block';
                        const isRoad = isRoadReceiveAddress(order.Address);
                        const activeSteps = isRoad ? ROAD_STEPS : HOME_STEPS;
                        buildProgressSteps(activeSteps);
                        updateProgressBar(status, activeSteps);
                        showStatusMeta(order);
                    }
                } else {
                    buildProgressSteps(HOME_STEPS);
                    resetSteps("আপনার অর্ডার আইডি লিখে Track বাটনে চাপুন", HOME_STEPS);
                    hideOrderInfo();
                    hideStatusMeta();
                    showToast("দুঃখিত! এই আইডি দিয়ে কোনো অর্ডার পাওয়া যায়নি।", "error");
                }
            })
            .catch(error => {
                console.error('Error fetching data:', error);
                document.getElementById('loadingMsg').style.display = 'none';
                buildProgressSteps(HOME_STEPS);
                resetSteps("আপনার অর্ডার আইডি লিখে Track বাটনে চাপুন", HOME_STEPS);
                hideOrderInfo();
                hideStatusMeta();
                showToast("সার্ভার এরর! দয়া করে কিছুক্ষণ পর আবার চেষ্টা করুন।", "error");
            });
    }

    // স্ট্যাটাস কখন আপডেট হলো (Status Updated At) এবং এডমিনের ছোট নোট (Status Note) দেখানো —
    // Sheet-এ এই দুই কলাম খালি থাকলে এই অংশটা চুপচাপ হাইড হয়ে যাবে, কোনো এরর দেখাবে না
    function showStatusMeta(order) {
        const updatedAt = (order["Status Updated At"] || "").trim();
        const note = (order["Status Note"] || "").trim();

        const updatedEl = document.getElementById('statusUpdatedAt');
        if (updatedAt) {
            updatedEl.innerHTML = `<i class="fas fa-clock"></i> সর্বশেষ আপডেট: ${updatedAt}`;
            updatedEl.style.display = 'block';
        } else {
            updatedEl.style.display = 'none';
        }

        const noteEl = document.getElementById('statusNote');
        if (note) {
            noteEl.innerHTML = `<i class="fas fa-sticky-note"></i> ${note}`;
            noteEl.style.display = 'block';
        } else {
            noteEl.style.display = 'none';
        }
    }

    function hideStatusMeta() {
        document.getElementById('statusUpdatedAt').style.display = 'none';
        document.getElementById('statusNote').style.display = 'none';
    }

    // কাস্টমারের তথ্য (নাম, নম্বর, ঠিকানা, অর্ডারের সময়) সুন্দর কার্ডে দেখানো — একই API রেসপন্স থেকেই, এক্সট্রা রিকোয়েস্ট লাগে না
    function fillOrderInfo(order) {
        const card = document.getElementById('orderInfoCard');

        document.getElementById('infoOrderId').innerText = order["Order ID"] || "-";
        document.getElementById('infoName').innerText = order.Name || "-";
        document.getElementById('infoMobile').innerText = order.Mobile || "-";
        document.getElementById('infoAddress').innerText = order.Address || "-";
        document.getElementById('infoDate').innerText = order["Order Date"] || "-";

        // রিফ্রেশ করে আবার সুন্দর স্লাইড-ইন ইফেক্ট চালানো
        card.classList.remove('show');
        void card.offsetWidth; // রিফ্লো ফোর্স করা, যাতে অ্যানিমেশন রিস্টার্ট হয়
        card.classList.add('show');
    }

    function hideOrderInfo() {
        const card = document.getElementById('orderInfoCard');
        card.classList.remove('show');
    }

    function resetSteps(neutralMessage, steps) {
        (steps || HOME_STEPS).forEach(s => {
            const el = document.getElementById(`step-${s.key}`);
            if (el) el.classList.remove('active');
        });
        const msgEl = document.getElementById('statusMessage');
        msgEl.innerText = neutralMessage || "";
        msgEl.classList.add('neutral');
    }

    function updateProgressBar(rawStatus, steps) {
        steps = steps || HOME_STEPS;
        steps.forEach(s => {
            const el = document.getElementById(`step-${s.key}`);
            if (el) el.classList.remove('active');
        });

        // শিটে স্ট্যাটাসের আগে/পরে স্পেস বা ছোট-বড় হাতের অক্ষরের তফাৎ থাকলেও মেলানোর জন্য
        const status = (rawStatus || "").trim().toLowerCase();
        const activeKey = STATUS_KEY_MAP[status];

        let message = "";
        const msgEl = document.getElementById('statusMessage');
        msgEl.classList.remove('neutral');

        const STATUS_MESSAGES = {
            'Pending': "আপনার অর্ডারটি গৃহীত হয়েছে। আমরা খুব দ্রুত কাজ শুরু করবো।",
            'Processing': "আপনার অর্ডারটি বর্তমানে প্যাকেজিং করা হচ্ছে।",
            'Shipped': "আপনার অর্ডারটি কুরিয়ারে দেওয়া হয়েছে। খুব শীঘ্রই পেয়ে যাবেন!",
            'InDivision': "আপনার অর্ডারটি আপনার বিভাগে পৌঁছে গেছে।",
            'InDistrict': "আপনার অর্ডারটি আপনার জেলায় পৌঁছে গেছে।",
            'WithRider': "আপনার অর্ডারটি রাইডারের কাছে আছে, খুব শীঘ্রই পেয়ে যাবেন!",
            'Delivered': "আপনার অর্ডারটি সফলভাবে ডেলিভারি সম্পন্ন হয়েছে! ধন্যবাদ।"
        };

        if (activeKey) {
            // স্ট্যাটাসের ক্রম অনুযায়ী, ম্যাচ হওয়া স্টেপ পর্যন্ত সবগুলো active করা হলো
            const activeIndex = steps.findIndex(s => s.key === activeKey);
            if (activeIndex !== -1) {
                for (let i = 0; i <= activeIndex; i++) {
                    const el = document.getElementById(`step-${steps[i].key}`);
                    if (el) el.classList.add('active');
                }
                message = STATUS_MESSAGES[activeKey] || "";
            } else {
                // ম্যাচ হওয়া স্টেপ এই ডেলিভারি টাইপের তালিকায় নেই (যেমন রোড রিসিভে In Division)
                msgEl.classList.add('neutral');
                message = "এই অর্ডারের সর্বশেষ স্ট্যাটাস: " + (rawStatus || "অজানা") + "। বিস্তারিত জানতে আমাদের সাথে যোগাযোগ করুন।";
            }
        } else {
            msgEl.classList.add('neutral');
            message = "এই অর্ডারের সর্বশেষ স্ট্যাটাস: " + (rawStatus || "অজানা") + "। বিস্তারিত জানতে আমাদের সাথে যোগাযোগ করুন।";
            showToast("স্ট্যাটাস সনাক্ত করা যায়নি, সাপোর্টে যোগাযোগ করুন।", "error");
        }

        msgEl.innerText = message;

        // স্ট্যাটাস আপডেটে সুন্দর পপ-ইন ইফেক্ট
        msgEl.classList.remove('status-animate');
        void msgEl.offsetWidth;
        msgEl.classList.add('status-animate');
    }


    function showToast(message, type) {
        const toast = document.getElementById('toastNotification');
        const icon = document.getElementById('toastIcon');
        const msg = document.getElementById('toastMessage');

        msg.innerText = message;
        icon.innerText = (type === 'error') ? '✕' : '✓';
        toast.className = 'toast show ' + (type || '');

        clearTimeout(window._toastTimer);
        window._toastTimer = setTimeout(() => {
            toast.className = 'toast';
        }, 3000);
    }

    // কার্টে প্রোডাক্ট থাকলে "Cart" আইকনে রেড ডট দেখানো হবে
    function updateCartBadge() {
        let badge = document.getElementById('orderNavBadge');
        if (!badge) return;
        let savedCart = JSON.parse(localStorage.getItem('myCart')) || [];
        if (savedCart.length > 0) {
            badge.classList.add('show');
        } else {
            badge.classList.remove('show');
        }
    }
    updateCartBadge();
    buildProgressSteps(HOME_STEPS);
</script>
