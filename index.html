<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TashUrA - Gadget & Lifestyle</title>
    <style>
        :root {
            --primary: #E31E24;     /* লাল */
            --navy: #0D1B2A;        /* গাঢ় নেভি */
            --accent-blue: #1976D2; /* নীল */
            --text-color: #0D1B2A;
            --subtext-color: #8a93a3;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: radial-gradient(circle at top, #ffffff 0%, #f3f5f8 60%, #eef1f6 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            transition: opacity 0.6s ease-in-out;
        }

        body.fade-out {
            opacity: 0;
        }

        .container {
            text-align: center;
            padding: 20px;
            max-width: 420px;
            width: 100%;
            position: relative;
        }

        /* পিছনে হালকা গ্লো ইফেক্ট */
        .glow {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 320px;
            height: 320px;
            transform: translate(-50%, -55%);
            background: radial-gradient(circle, rgba(227,30,36,0.10) 0%, rgba(25,118,210,0.08) 45%, transparent 70%);
            border-radius: 50%;
            z-index: 0;
            filter: blur(10px);
        }

        .logo-box {
            position: relative;
            z-index: 1;
        }

        .logo-box img {
            width: 78%;
            max-width: 230px;
            height: auto;
            opacity: 0;
            transform: translateY(20px) scale(0.96);
            animation: fadeInUp 1s ease-out forwards;
            filter: drop-shadow(0 10px 18px rgba(13, 27, 42, 0.18));
        }

        h1 {
            font-size: 30px;
            margin: 22px 0 6px;
            font-weight: 800;
            letter-spacing: 0.5px;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUp 1s ease-out 0.2s forwards;
        }

        h1 .tash { color: var(--primary); }
        h1 .ur { color: var(--accent-blue); }
        h1 .a { color: var(--navy); }

        .tagline {
            font-size: 12px;
            color: var(--subtext-color);
            letter-spacing: 3px;
            text-transform: uppercase;
            font-weight: 600;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUp 1s ease-out 0.4s forwards;
        }

        .tagline span {
            display: inline-block;
        }

        .divider {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 8px;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUp 1s ease-out 0.45s forwards;
        }

        .divider .line {
            height: 2px;
            width: 26px;
            border-radius: 2px;
        }

        .divider .line.left { background: var(--primary); }
        .divider .line.right { background: var(--accent-blue); }

        .welcome-msg {
            margin-top: 26px;
            font-size: 14px;
            color: var(--text-color);
            font-weight: 500;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUp 1s ease-out 0.55s forwards;
        }

        .loader-container {
            margin-top: 30px;
            width: 100%;
            height: 3px;
            background-color: #e6e9ee;
            border-radius: 3px;
            overflow: hidden;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUp 1s ease-out 0.65s forwards;
        }

        .loader-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--primary), var(--accent-blue), var(--navy));
            background-size: 200% 100%;
            animation: loadProgress 2.5s cubic-bezier(0.4, 0, 0.2, 1) 0.8s forwards,
                       shimmer 2s linear infinite;
            border-radius: 3px;
        }

        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes loadProgress {
            0% { width: 0%; }
            50% { width: 70%; }
            100% { width: 100%; }
        }

        @keyframes shimmer {
            0% { background-position: 0% 0; }
            100% { background-position: 200% 0; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="glow"></div>

        <div class="logo-box">
            <img src="logo.jpg.jpeg" alt="TashUrA Logo">
        </div>

        <h1><span class="tash">Tash</span><span class="ur">Ur</span><span class="a">A</span></h1>
        <p class="tagline">Gadget &amp; Lifestyle</p>

        <div class="divider">
            <div class="line left"></div>
            <div class="line right"></div>
        </div>

        <p class="welcome-msg">স্বাগতম আপনার পছন্দের গ্যাজেট দুনিয়ায়</p>

        <div class="loader-container">
            <div class="loader-bar"></div>
        </div>
    </div>

    <script>
        setTimeout(() => {
            document.body.classList.add('fade-out');
            setTimeout(() => {
                window.location.href = 'home.html';
            }, 600);
        }, 3500);
    </script>

</body>
</html>
