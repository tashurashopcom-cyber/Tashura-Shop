<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ideas SHOP</title>
    <style>
        :root {
            --primary-color: #e5981a; /* আপনার লোগোর রঙ */
            --text-color: #333333;
            --subtext-color: #888888;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden; /* স্ক্রলবার লুকানোর জন্য */
            transition: opacity 0.6s ease-in-out; /* ফেড-আউট ট্রানজিশন */
        }

        /* পেজ পরিবর্তনের সময় এই ক্লাসটি কল হবে */
        body.fade-out {
            opacity: 0;
        }

        .container {
            text-align: center;
            padding: 20px;
            max-width: 400px;
            width: 100%;
        }

        .logo-box img {
            width: 70%;
            max-width: 180px;
            height: auto;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUp 1s ease-out forwards;
        }

        h1 {
            font-size: 26px;
            color: var(--primary-color);
            margin: 25px 0 8px;
            font-weight: 700;
            letter-spacing: 0.5px;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUp 1s ease-out 0.2s forwards; /* একটু দেরিতে আসবে */
        }

        p {
            font-size: 13px;
            color: var(--subtext-color);
            letter-spacing: 3px;
            text-transform: uppercase;
            font-weight: 500;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUp 1s ease-out 0.4s forwards;
        }

        /* প্রোগ্রেস বারের কন্টেইনার */
        .loader-container {
            margin-top: 40px;
            width: 100%;
            height: 2px;
            background-color: #f0f0f0;
            border-radius: 2px;
            overflow: hidden;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUp 1s ease-out 0.6s forwards;
        }

        /* প্রোগ্রেস বারের এনিমেশন */
        .loader-bar {
            height: 100%;
            width: 0%;
            background-color: var(--primary-color);
            animation: loadProgress 2.5s cubic-bezier(0.4, 0, 0.2, 1) 0.8s forwards;
        }

        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes loadProgress {
            0% { width: 0%; }
            50% { width: 70%; }
            100% { width: 100%; }
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- লোগো সেকশন -->
        <div class="logo-box">
            <img src="Logo1.png" alt="Ideas SHOP Logo">
        </div>

        <!-- টেক্সট সেকশন -->
        <h1>Ideas SHOP</h1>
        <p>Make Life Meaningful</p>

        <!-- স্লিক প্রোগ্রেস বার -->
        <div class="loader-container">
            <div class="loader-bar"></div>
        </div>
    </div>

    <!-- জাভাস্ক্রিপ্ট অটো-রিডাইরেক্টের জন্য -->
    <script>
        // ৩.৫ সেকেন্ড পর (এনিমেশন শেষ হওয়ার পর) পেজ ফেড-আউট হবে
        setTimeout(() => {
            document.body.classList.add('fade-out');
            
            // ফেড-আউট হওয়ার জন্য ৬০০ মিলি-সেকেন্ড সময় দিয়ে তারপর রিডাইরেক্ট করবে
            setTimeout(() => {
                window.location.href = 'home.html';
            }, 600); 
        }, 3500);
    </script>

</body>
</html>
