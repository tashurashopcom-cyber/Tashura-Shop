<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>TashUrA - ধন্যবাদ</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        :root {
            --primary: #E31E24;
            --navy: #0D1B2A;
            --accent-blue: #1976D2;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, var(--navy), #16263b 55%, var(--accent-blue));
            color: #333;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .ty-card {
            background: white;
            border-radius: 24px;
            padding: 40px 30px;
            width: 85%;
            max-width: 340px;
            text-align: center;
            box-shadow: 0 15px 40px rgba(0,0,0,0.30);
            animation: popUp 0.5s ease;
            position: relative;
            overflow: hidden;
        }

        .ty-card::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 5px;
            background: linear-gradient(90deg, var(--primary), var(--accent-blue), var(--navy));
        }

        @keyframes popUp {
            from { transform: scale(0.7); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .ty-icon {
            font-size: 64px;
            color: var(--primary);
            margin-bottom: 15px;
            animation: light-glow 1.3s infinite alternate ease-in-out;
        }

        @keyframes light-glow {
            0% { text-shadow: none; transform: scale(1); }
            100% {
                text-shadow: 0 0 15px rgba(227, 30, 36, 0.5), 0 0 30px rgba(25, 118, 210, 0.5);
                transform: scale(1.08);
            }
        }

        .ty-card h2 {
            margin: 5px 0 8px;
            color: var(--navy);
            font-size: 22px;
            font-weight: 800;
        }

        .brand {
            font-weight: 800;
            font-size: 15px;
            letter-spacing: 0.5px;
            margin: 2px 0 10px;
        }
        .brand .tash { color: var(--primary); }
        .brand .ur { color: var(--accent-blue); }
        .brand .a { color: var(--navy); }

        .ty-card p {
            color: #777;
            font-size: 14px;
            margin: 4px 0;
            line-height: 1.5;
        }

        .ty-divider {
            width: 50px;
            height: 3px;
            background: linear-gradient(90deg, var(--primary), var(--accent-blue));
            border-radius: 5px;
            margin: 16px auto;
        }

        .progress-wrap {
            margin-top: 22px;
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: #f0f2f5;
            border-radius: 10px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            width: 100%;
            background: linear-gradient(135deg, var(--primary), var(--accent-blue), var(--navy));
            border-radius: 10px;
            animation: shrinkBar 3s linear forwards;
        }

        @keyframes shrinkBar {
            from { width: 100%; }
            to { width: 0%; }
        }

        .redirect-label {
            font-size: 12px;
            color: #aaa;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <div class="ty-card">
        <i class="fas fa-circle-check ty-icon"></i>
        <h2>ধন্যবাদ!</h2>
        <p class="brand"><span class="tash">Tash</span><span class="ur">Ur</span><span class="a">A</span> এর সাথে থাকার জন্য আমরা কৃতজ্ঞ</p>
        <div class="ty-divider"></div>
        <p>আপনার অর্ডার আইডি সফলভাবে কপি হয়ে গেছে</p>

        <div class="progress-wrap">
            <div class="progress-bar">
                <div class="progress-fill"></div>
            </div>
            <div class="redirect-label">হোম পেজে নিয়ে যাওয়া হচ্ছে...</div>
        </div>
    </div>

    <script>
        setTimeout(function () {
            window.location.href = "home.html";
        }, 5000);
    </script>

</body>
</html>
